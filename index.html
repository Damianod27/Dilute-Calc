<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 DiluteCalc</title>
    
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='white'/><text y='75' x='15' font-size='60'>🖩</text></svg>">
    
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; color-scheme: dark; }
        input { caret-color: #10b981; outline: none; }
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; appearance: none; }
        
        .custom-arrow-btn {
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; user-select: none; height: 50%;
            transition: background-color 0.1s;
        }
        .custom-arrow-btn:active { background-color: #3f3f46; }
        .input-box { transition: box-shadow 0.2s ease; }
        
        .lang-btn { cursor: pointer; transition: all 0.2s; }
        .lang-btn.active { color: white; font-weight: bold; }
        .lang-btn.inactive { color: rgba(255,255,255,0.5); }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-zinc-900 rounded-3xl shadow-2xl overflow-hidden border border-zinc-800">
        
        <div class="bg-gradient-to-r from-emerald-500 to-cyan-500 px-4 py-6 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 bg-white/20 backdrop-blur-2xl rounded-2xl flex items-center justify-center text-4xl shrink-0">🧪</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">DiluteCalc</h1>
                    <p id="sub-header" class="text-emerald-100 text-sm -mt-1">Chemical Dilution Calculator</p>
                </div>
            </div>
            <div class="flex gap-2 text-xs uppercase tracking-widest bg-black/10 p-2 rounded-xl">
                <span id="btn-en" class="lang-btn active" onclick="setLang('en')">EN</span>
                <span class="opacity-30">|</span>
                <span id="btn-pl" class="lang-btn inactive" onclick="setLang('pl')">PL</span>
            </div>
        </div>

        <div class="px-4 py-7">
            <div>
                <label id="label-volume" class="flex items-center gap-2 text-sm font-medium text-zinc-400 mb-1 uppercase font-bold">
                    <span class="text-amber-400 text-xl">📏</span> Total solution volume
                </label>
                <div class="input-box relative flex items-center bg-zinc-800 border border-zinc-700 focus-within:shadow-[0_0_0_3px_#10b981] rounded-3xl h-[84px] px-7">
                    <input type="number" id="volume" value="1" step="0.1" min="0.1" class="flex-1 bg-transparent text-4xl font-semibold outline-none w-full">
                    <div class="flex items-center gap-4 shrink-0">
                        <div class="flex flex-col bg-zinc-800 text-zinc-400 rounded-full w-[28px] h-[48px] overflow-hidden border border-zinc-600">
                            <div class="custom-arrow-btn" onclick="zmien('volume', 0.1, 0.1)">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7"></path></svg>
                            </div>
                            <div class="custom-arrow-btn border-t border-zinc-600" onclick="zmien('volume', -0.1, 0.1)">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                        <div id="unit-liters" class="text-zinc-400 font-medium text-2xl w-[80px] text-right uppercase font-bold">liters</div>
                    </div>
                </div>
                <p id="desc-volume" class="text-xs text-zinc-500 mt-2 pl-2">How many liters of ready solution do you want to make?</p>
            </div>

            <div class="mt-4">
                <label id="label-ratio" class="flex items-center gap-2 text-sm font-medium text-zinc-400 mb-1 uppercase font-bold">
                    <span class="text-cyan-400 text-xl">🧪</span> Dilution ratio
                </label>
                <div class="input-box relative flex items-center bg-zinc-800 border border-zinc-700 focus-within:shadow-[0_0_0_3px_#10b981] rounded-3xl h-[84px] px-7">
                    <div class="text-4xl font-bold text-emerald-400 pr-2">1 :</div>
                    <input type="number" id="ratio" value="15" min="1" step="1" class="flex-1 bg-transparent text-cyan-400 text-4xl font-semibold outline-none w-full text-center pr-2">
                    <div class="flex items-center gap-4 shrink-0">
                        <div class="flex flex-col bg-zinc-800 text-zinc-400 rounded-full w-[28px] h-[48px] overflow-hidden border border-zinc-600">
                            <div class="custom-arrow-btn" onclick="zmien('ratio', 1, 1)">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 15l7-7 7 7"></path></svg>
                            </div>
                            <div class="custom-arrow-btn border-t border-zinc-600" onclick="zmien('ratio', -1, 1)">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                        <div id="unit-parts" class="text-zinc-400 font-medium text-xl leading-tight w-[80px] text-center uppercase font-bold">parts<br>water</div>
                    </div>
                </div>
                <p id="desc-ratio" class="text-xs text-zinc-500 mt-2 pl-2">Example: 1:15 = 1 part product + 15 parts water</p>
            </div>

            <div class="mt-4">
                <label id="label-ready" class="flex items-center gap-2 text-sm font-medium text-zinc-400 mb-2 uppercase font-bold">
                    <span class="text-emerald-400 text-xl">✨</span> Ready Solution
                </label>
                <div id="result" class="result-box bg-zinc-950 border border-zinc-700 rounded-3xl px-6 pt-6 pb-5 space-y-5">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-9 h-9 bg-emerald-500/10 rounded-2xl flex items-center justify-center text-2xl">🧴</div>
                            <div>
                                <div id="res-product" class="text-xs text-zinc-400 tracking-wider uppercase font-bold">Product</div>
                                <div id="product" class="text-4xl font-bold text-emerald-400">62.50</div>
                            </div>
                        </div>
                        <div class="text-xl text-zinc-500 font-bold">ml</div>
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-4">
                            <div class="w-9 h-9 bg-cyan-500/10 rounded-2xl flex items-center justify-center text-2xl">💧</div>
                            <div>
                                <div id="res-water" class="text-xs text-zinc-400 tracking-wider uppercase font-bold">Water</div>
                                <div id="water" class="text-4xl font-bold text-cyan-400">937.50</div>
                            </div>
                        </div>
                        <div class="text-xl text-zinc-500 font-bold">ml</div>
                    </div>
                    <div class="pt-5 border-t border-zinc-700 flex justify-center">
                        <div class="inline-flex items-center gap-2 bg-zinc-900 px-6 py-2 rounded-3xl text-base">
                            <span class="text-emerald-400 font-bold">✓</span> <span id="res-total-label" class="text-zinc-400">Total:</span>
                            <span id="total" class="font-semibold text-white">1000 ml</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="mt-5 pt-7 border-t border-zinc-800/50 text-center">
                <p class="text-[10px] text-zinc-600 uppercase tracking-[0.3em] font-bold">
                    Powered by <a href="mailto:dilutecalc@icloud.com" class="text-zinc-400 hover:text-white transition-colors">Storm Design</a>
                </p>
            </div>
        </div>
    </div>

    <script>
        const translations = {
            en: {
                subHeader: "Chemical Dilution Calculator",
                labelVolume: "Total solution volume",
                unitLiters: "liters",
                descVolume: "How many liters of ready solution do you want to make?",
                labelRatio: "Dilution ratio",
                unitParts: "parts<br>water",
                descRatio: "Example: 1:15 = 1 part product + 15 parts water",
                labelReady: "Ready Solution",
                resProduct: "Product",
                resWater: "Water",
                resTotalLabel: "Total:"
            },
            pl: {
                subHeader: "Kalkulator Stężenia Chemii",
                labelVolume: "Całkowita objętość roztworu",
                unitLiters: "litry",
                descVolume: "Ile litrów gotowego roztworu chcesz zrobić?",
                labelRatio: "Stosunek rozcieńczenia",
                unitParts: "części<br>wody",
                descRatio: "Przykład: 1:15 = 1 część chemii + 15 części wody",
                labelReady: "Gotowy Roztwór",
                resProduct: "Produkt",
                resWater: "Woda",
                resTotalLabel: "Razem:"
            }
        };

        function setLang(lang) {
            document.documentElement.lang = lang;
            const t = translations[lang];
            
            document.getElementById('sub-header').textContent = t.subHeader;
            document.getElementById('label-volume').innerHTML = `<span class="text-amber-400 text-xl">📏</span> ${t.labelVolume}`;
            document.getElementById('unit-liters').textContent = t.unitLiters;
            document.getElementById('desc-volume').textContent = t.descVolume;
            document.getElementById('label-ratio').innerHTML = `<span class="text-cyan-400 text-xl">🧪</span> ${t.labelRatio}`;
            document.getElementById('unit-parts').innerHTML = t.unitParts;
            document.getElementById('desc-ratio').textContent = t.descRatio;
            document.getElementById('label-ready').innerHTML = `<span class="text-emerald-400 text-xl">✨</span> ${t.labelReady}`;
            document.getElementById('res-product').textContent = t.resProduct;
            document.getElementById('res-water').textContent = t.resWater;
            document.getElementById('res-total-label').textContent = t.resTotalLabel;

            document.getElementById('btn-en').className = `lang-btn ${lang === 'en' ? 'active' : 'inactive'}`;
            document.getElementById('btn-pl').className = `lang-btn ${lang === 'pl' ? 'active' : 'inactive'}`;
        }

        function zmien(id, krok, min) {
            const el = document.getElementById(id);
            let val = (parseFloat(el.value) || min) + krok;
            val = Math.round(val * 10) / 10;
            if (val < min) val = min;
            el.value = val;
            oblicz();
        }

        function oblicz() {
            let v = parseFloat(document.getElementById('volume').value) || 0;
            let r = parseFloat(document.getElementById('ratio').value) || 1;
            if (v < 0) v = 0;
            if (r < 1) r = 1;
            const total = v * 1000;
            const prod = total / (1 + r);
            const water = total - prod;
            document.getElementById('product').textContent = prod.toFixed(2);
            document.getElementById('water').textContent = water.toFixed(2);
            document.getElementById('total').textContent = Math.round(total) + " ml";
        }

        document.getElementById('volume').addEventListener('input', oblicz);
        document.getElementById('ratio').addEventListener('input', oblicz);
        
        window.onload = () => {
            setLang('en');
            oblicz();
        };
    </script>
</body>
</html>
